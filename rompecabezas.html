<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mini Héroes</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Fredoka', sans-serif;
}

body{
    overflow-x:hidden;
    background:
    linear-gradient(to bottom,#6fc8ff,#dff6ff);
    min-height:100vh;
}

/* ===== DECORACION ===== */

.decor{
    position:fixed;
    width:100%;
    height:100%;
    pointer-events:none;
    overflow:hidden;
    z-index:0;
}

.icon{
    position:absolute;
    font-size:40px;
    animation:float 6s infinite ease-in-out;
    opacity:0.3;
}

@keyframes float{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-15px);}
    100%{transform:translateY(0px);}
}

/* ===== PANTALLA MENU ===== */

.home-screen{
    position:relative;
    z-index:2;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:30px;
}

.logo{
    width:180px;
    margin-bottom:10px;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.05);}
    100%{transform:scale(1);}
}

.title{
    font-size:90px;
    color:#003b8e;
    text-shadow:
    5px 5px 0px white,
    8px 8px 15px rgba(0,0,0,0.2);
}

.subtitle{
    margin-top:15px;
    font-size:30px;
    color:#ff2b2b;
    background:white;
    padding:12px 25px;
    border-radius:30px;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

.menu-buttons{
    margin-top:50px;
    display:flex;
    gap:35px;
    flex-wrap:wrap;
    justify-content:center;
}

.menu-btn{
    width:260px;
    padding:25px;
    border:none;
    border-radius:35px;
    cursor:pointer;
    transition:0.3s;
    color:white;
    font-size:32px;
    font-weight:bold;
    box-shadow:0 10px 20px rgba(0,0,0,0.25);
    position:relative;
    overflow:hidden;
}

.menu-btn::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(255,255,255,0.2);
    left:-100%;
    top:0;
    transition:0.5s;
}

.menu-btn:hover::before{
    left:100%;
}

.menu-btn:hover{
    transform:scale(1.08) rotate(-2deg);
}

.fire{
    background:
    linear-gradient(to bottom,#ffb300,#ff3d00);
}

.police{
    background:
    linear-gradient(to bottom,#4ba3ff,#003b8e);
}

.ambulance{
    background:
    linear-gradient(to bottom,#ff80d5,#d10087);
}

/* ===== JUEGO ===== */

.game-screen{
    display:none;
    position:relative;
    z-index:2;
    padding:20px;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
    flex-wrap:wrap;
}

.game-title{
    font-size:55px;
    color:#003b8e;
    background:white;
    padding:15px 25px;
    border-radius:25px;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

.timer{
    background:#ff2b2b;
    color:white;
    padding:15px 25px;
    border-radius:20px;
    font-size:35px;
    font-weight:bold;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.main-game{
    display:flex;
    gap:25px;
    justify-content:center;
    flex-wrap:wrap;
}

.left-panel{
    width:300px;
}

.box-title{
    background:#003b8e;
    color:white;
    text-align:center;
    padding:15px;
    border-radius:18px;
    font-size:28px;
    margin-bottom:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

.pieces{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    background:white;
    padding:15px;
    border-radius:25px;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.piece{
    width:100%;
    aspect-ratio:4/3;
    border-radius:15px;
    cursor:grab;
    background-repeat:no-repeat;
    border:4px solid white;
    transition:0.2s;
}

.piece:hover{
    transform:scale(1.03);
}

.board{
    width:750px;
    height:560px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    grid-template-rows:repeat(3,1fr);
    gap:5px;
    background:#003b8e;
    padding:8px;
    border-radius:25px;
    box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

.cell{
    background:#d8ecff;
    border-radius:15px;
    overflow:hidden;
    transition:0.3s;
}

.cell.correct{
    border:5px solid #00d26a;
    animation:correctGlow 1s infinite alternate;
}

@keyframes correctGlow{
    from{
        box-shadow:0 0 10px #00ff80;
    }
    to{
        box-shadow:0 0 20px #00ff80;
    }
}

.buttons{
    display:flex;
    gap:10px;
    margin-top:20px;
}

.action-btn{
    flex:1;
    border:none;
    padding:16px;
    border-radius:18px;
    font-size:20px;
    font-weight:bold;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

.action-btn:hover{
    transform:scale(1.05);
}

.restart{
    background:#ff3d00;
}

.back{
    background:#003b8e;
}

.message{
    margin-top:20px;
    min-height:40px;
    text-align:center;
    font-size:30px;
    font-weight:bold;
}

</style>
</head>

<body>

<!-- ===== DECORACION ===== -->

<div class="decor">

    <div class="icon" style="top:5%; left:5%;">🚒</div>
    <div class="icon" style="top:10%; right:8%;">🚑</div>
    <div class="icon" style="top:35%; left:3%;">🚓</div>
    <div class="icon" style="top:60%; right:5%;">🩺</div>
    <div class="icon" style="top:80%; left:10%;">👮</div>
    <div class="icon" style="top:20%; left:45%;">❤️</div>
    <div class="icon" style="top:70%; right:20%;">🔥</div>
    <div class="icon" style="top:40%; right:40%;">⛑️</div>

</div>

<!-- ===== MENU ===== -->

<div class="home-screen" id="homeScreen">

    <img class="logo"
    src="https://cdn-icons-png.flaticon.com/512/616/616490.png">

    <div class="title">
        MINI HÉROES
    </div>

    <div class="subtitle">
        🚒🚓🚑 ¡Aprende jugando con los héroes de emergencia! 🚒🚓🚑
    </div>

    <div class="menu-buttons">

        <button class="menu-btn fire"
        onclick="startGame('fire')">

            🚒<br>
            BOMBEROS

        </button>

        <button class="menu-btn police"
        onclick="startGame('police')">

            🚓<br>
            POLICÍAS

        </button>

        <button class="menu-btn ambulance"
        onclick="startGame('ambulance')">

            🚑<br>
            AMBULANCIAS

        </button>

    </div>

</div>

<!-- ===== JUEGO ===== -->

<div class="game-screen" id="gameScreen">

    <div class="top-bar">

        <div class="game-title"
        id="gameTitle">
            ROMPECABEZAS
        </div>

        <div class="timer">
            ⏰ <span id="time">01:00</span>
        </div>

    </div>

    <div class="main-game">

        <div class="left-panel">

            <div class="box-title">
                🧩 PIEZAS
            </div>

            <div class="pieces"
            id="piecesContainer"></div>

            <div class="buttons">

                <button class="action-btn restart"
                onclick="restartGame()">

                    🔄 Reiniciar

                </button>

                <button class="action-btn back"
                onclick="goHome()">

                    🏠 Inicio

                </button>

            </div>

            <div class="message"
            id="message"></div>

        </div>

        <div class="right-panel">

            <div class="box-title">
                ⭐ COMPLETA LA IMAGEN ⭐
            </div>

            <div class="board"
            id="board"></div>

        </div>

    </div>

</div>

<script>

/* ===== IMAGENES ===== */

const images = {

    fire:"bomberos.png",

    police:"img/.png/Policia.png", 

    ambulance:"img/.png/ambulanciapaso.png"

};

const titles = {

    fire:"🚒 ROMPECABEZAS DE BOMBEROS",

    police:"🚓 ROMPECABEZAS DE POLICÍAS",

    ambulance:"🚑 ROMPECABEZAS DE AMBULANCIAS"

};

let currentImage = "";

const rows = 3;
const cols = 3;

const board =
document.getElementById("board");

const piecesContainer =
document.getElementById("piecesContainer");

const message =
document.getElementById("message");

let draggedPiece = null;
let correctPlaced = 0;

/* ===== INICIAR ===== */

function startGame(type){

    currentImage = images[type];

    document.getElementById(
    "homeScreen").style.display = "none";

    document.getElementById(
    "gameScreen").style.display = "block";

    document.getElementById(
    "gameTitle").innerHTML =
    titles[type];

    createBoard();

    startTimer();

}

/* ===== VOLVER ===== */

function goHome(){

    document.getElementById(
    "homeScreen").style.display = "flex";

    document.getElementById(
    "gameScreen").style.display = "none";

    clearInterval(timer);

}

/* ===== TABLERO ===== */

function createBoard(){

    board.innerHTML = "";
    piecesContainer.innerHTML = "";
    message.innerHTML = "";
    correctPlaced = 0;

    let pieces = [];

    for(let r=0;r<rows;r++){

        for(let c=0;c<cols;c++){

            // PIEZA
            const piece =
            document.createElement("div");

            piece.classList.add("piece");

            piece.draggable = true;

            piece.dataset.correct =
            `${r}-${c}`;

            piece.style.backgroundImage =
            `url('${currentImage}')`;

            piece.style.backgroundSize =
            `${cols*100}% ${rows*100}%`;

            piece.style.backgroundPosition =
            `${(c/(cols-1))*100}% ${(r/(rows-1))*100}%`;

            piece.addEventListener(
            "dragstart", ()=>{

                draggedPiece = piece;

            });

            pieces.push(piece);

            // CELDA
            const cell =
            document.createElement("div");

            cell.classList.add("cell");

            cell.dataset.position =
            `${r}-${c}`;

            cell.addEventListener(
            "dragover",(e)=>{

                e.preventDefault();

            });

            // SOLTAR
            cell.addEventListener(
            "drop",()=>{

                if(cell.children.length===0){

                    cell.appendChild(
                    draggedPiece);

                    // CORRECTA
                    if(
                    draggedPiece.dataset.correct
                    === cell.dataset.position
                    ){

                        cell.classList.add(
                        "correct");

                        message.innerHTML =
                        "✅ ¡Muy bien!";

                        message.style.color =
                        "#00a000";

                        correctPlaced++;

                        // GANAR
                        if(correctPlaced === rows*cols){

                            clearInterval(timer);

                            message.innerHTML =
                            "🎉 ¡MISIÓN COMPLETADA! 🎉";

                            message.style.color =
                            "#ff7b00";

                        }

                    }

                    // INCORRECTA
                    else{

                        cell.style.border =
                        "5px solid red";

                        message.innerHTML =
                        "❌ Esa pieza no va ahí";

                        message.style.color =
                        "red";

                        setTimeout(()=>{

                            piecesContainer
                            .appendChild(
                            draggedPiece);

                            cell.style.border =
                            "none";

                        },700);

                    }

                }

            });

            board.appendChild(cell);

        }

    }

    // MEZCLAR
    pieces.sort(()=>
    Math.random()-0.5);

    pieces.forEach(piece=>{

        piecesContainer
        .appendChild(piece);

    });

}

/* ===== TEMPORIZADOR ===== */

let timeLeft = 60;
let timer;

function startTimer(){

    clearInterval(timer);

    timeLeft = 60;

    updateTime();

    timer = setInterval(()=>{

        timeLeft--;

        updateTime();

        if(timeLeft <= 0){

            clearInterval(timer);

            message.innerHTML =
            "⏰ ¡SE ACABÓ EL TIEMPO!";

            message.style.color =
            "red";

        }

    },1000);

}

function updateTime(){

    let minutes =
    String(Math.floor(
    timeLeft/60))
    .padStart(2,"0");

    let seconds =
    String(timeLeft%60)
    .padStart(2,"0");

    document.getElementById(
    "time").textContent =
    `${minutes}:${seconds}`;

}

/* ===== REINICIAR ===== */

function restartGame(){

    createBoard();

    startTimer();

}

</script>

</body>
</html>
